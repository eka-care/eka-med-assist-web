name: Build and Deploy

on:
  push:
    tags:
      - prod-*

jobs:
  build-and-upload:
    runs-on: prod-runner-server
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.REPO_READ_ONLY_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn     
          
      - name: Get the version
        id: get_version
        run: echo VERSION=$(echo $GITHUB_REF | cut -d / -f 3) >> $GITHUB_OUTPUT
        
      - name: Install Submodule Dependencies
        run: |
              cd packages/ui/base
              yarn install --frozen-lockfile
              yarn build 

      - name: Build project
        run: | 
              yarn install --frozen-lockfile
              yarn build
        
      - name: iam role for the github runner
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: arn:aws:iam::559615561845:role/github-runner-role
          role-session-name: runner-role
          aws-region: ${{ secrets.PROD_AWS_Region }}

      - name: Copy to s3
        env:
          IMAGE_TAG: ${{ steps.get_version.outputs.VERSION }}        
          BUCKET_NAME: m-prod-medassist
        run: |
            aws s3 cp --recursive dist/ s3://BUCKET_NAME/main/apollo/
            aws s3 cp --recursive dist/ s3://BUCKET_NAME/$IMAGE_TAG/apollo/

  invalidate-cache:
    needs: build-and-upload
    runs-on: prod-runner-server
    steps:

      - name: iam role for the github runner
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: arn:aws:iam::559615561845:role/github-runner-role
          role-session-name: runner-role
          aws-region: ${{ secrets.PROD_AWS_Region }}
          
      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: E28HK05OKVJUSV
          AWS_REGION: ${{ secrets.PROD_AWS_REGION }}          
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
