name: Dev Build and Deploy

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: dev-ec2-server
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.argocd_github_token }}

      - name: Get the version
        id: get_version
        run: echo VERSION=$(echo $GITHUB_REF | cut -d / -f 3) >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: setup yarn
        run: |
          npm install -g yarn

      - name: Install Submodule Dependencies
        run: |
          cd packages/ui/base
          echo "------------------------------------------------------"
          ls /home/ec2-user/actions-runner/_work/eka-med-assist-web/eka-med-assist-web/packages/ui/base/src/eka-ui/icons
          yarn install --frozen-lockfile

      - name: Run dev script
        env:
          TAG: ${{ steps.get_version.outputs.VERSION }}
        run: |
          git config user.name "orbi-ci-bot"
          git config user.email "devops@eka.care"
          bash deploy-stage.sh 
       